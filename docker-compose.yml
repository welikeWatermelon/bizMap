services:
  db:
    image: postgis/postgis:15-3.4
    container_name: bizmap-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bizmap}
      POSTGRES_USER: ${POSTGRES_USER:-bizmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bizmap1234}
    ports:
      - "5433:5432"
    volumes:
      - bizmap-data:/var/lib/postgresql/data

volumes:
  bizmap-data:
