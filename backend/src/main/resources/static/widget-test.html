<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>BizMap 위젯 테스트</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #1976d2; }
    .info { background: #f5f5f5; padding: 12px; border-radius: 4px; font-size: 13px; color: #555; margin-bottom: 20px; }
    code { background: #e0e0e0; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>유니클로 매장 찾기</h1>
  <div class="info">
    이 페이지는 BizMap 위젯 테스트용 HTML입니다.<br/>
    URL 쿼리 <code>?key=YOUR_KEY</code>로 위젯 키를 지정할 수 있습니다.
    기본값은 <code>TEST_KEY</code>입니다.
  </div>

  <div id="bizmap-widget" style="width:100%;height:500px;"></div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var key = params.get('key') || 'TEST_KEY';
      var googleMapsKey = '%GOOGLE_MAPS_KEY%';

      function loadScript(src, cb) {
        var s = document.createElement('script');
        s.src = src;
        s.async = true;
        s.defer = true;
        if (cb) s.onload = cb;
        document.head.appendChild(s);
      }

      // Google Maps JS를 먼저 로드 (있을 경우)
      if (googleMapsKey && googleMapsKey.indexOf('%') !== 0) {
        loadScript('https://maps.googleapis.com/maps/api/js?key=' + googleMapsKey, function () {
          loadScript('/widget/bizmap-widget.js?key=' + encodeURIComponent(key));
        });
      } else {
        loadScript('/widget/bizmap-widget.js?key=' + encodeURIComponent(key));
      }
    })();
  </script>
</body>
</html>
